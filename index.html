<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunk</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="top-bar">
      <h1>lunk</h1>
      <p>Weekly muscle coverage</p>
    </header>

    <section class="muscle-card">
      <h2><span id="coveragePercent">0%</span></h2>
      <p>Muscles Worked This Week</p>

      <div class="body-row">
        <svg class="body-map" viewBox="0 0 160 300">
          <circle cx="80" cy="28" r="18" class="body-part neutral" />

          <rect x="58" y="50" width="44" height="70" rx="18" class="body-part neutral" />

          <rect id="chest" x="54" y="58" width="52" height="28" rx="10" class="body-part muscle" />
          <rect id="abs" x="62" y="90" width="36" height="45" rx="10" class="body-part muscle" />

          <rect id="shoulders" x="35" y="55" width="90" height="18" rx="9" class="body-part muscle" />

          <rect id="biceps" x="28" y="80" width="20" height="70" rx="10" class="body-part muscle" />
          <rect id="triceps" x="112" y="80" width="20" height="70" rx="10" class="body-part muscle" />

          <rect id="forearms" x="22" y="145" width="18" height="65" rx="9" class="body-part muscle" />
          <rect x="120" y="145" width="18" height="65" rx="9" class="body-part muscle forearms-copy" />

          <rect id="quads" x="52" y="135" width="24" height="90" rx="10" class="body-part muscle" />
          <rect x="84" y="135" width="24" height="90" rx="10" class="body-part muscle quads-copy" />

          <rect id="calves" x="54" y="220" width="20" height="65" rx="10" class="body-part muscle" />
          <rect x="86" y="220" width="20" height="65" rx="10" class="body-part muscle calves-copy" />
        </svg>

        <svg class="body-map" viewBox="0 0 160 300">
          <circle cx="80" cy="28" r="18" class="body-part neutral" />

          <rect x="58" y="50" width="44" height="70" rx="18" class="body-part neutral" />

          <rect id="upper_back" x="55" y="58" width="50" height="48" rx="12" class="body-part muscle" />
          <rect id="lats" x="42" y="75" width="76" height="60" rx="15" class="body-part muscle" />

          <rect id="rear_delts" x="35" y="55" width="90" height="18" rx="9" class="body-part muscle" />

          <rect id="glutes" x="52" y="128" width="56" height="38" rx="16" class="body-part muscle" />

          <rect id="hamstrings" x="52" y="165" width="24" height="70" rx="10" class="body-part muscle" />
          <rect x="84" y="165" width="24" height="70" rx="10" class="body-part muscle hamstrings-copy" />

          <rect id="back_calves" x="54" y="230" width="20" height="55" rx="10" class="body-part muscle calves-copy" />
          <rect x="86" y="230" width="20" height="55" rx="10" class="body-part muscle calves-copy" />
        </svg>
      </div>

      <div class="summary">
        <div>
          <span>Most worked</span>
          <strong id="mostWorked">None yet</strong>
        </div>
        <div>
          <span>Needs attention</span>
          <strong id="needsWork">None yet</strong>
        </div>
      </div>
    </section>

    <section class="log-card">
      <h2>Quick Log</h2>

      <label for="exerciseSelect">Exercise</label>
      <select id="exerciseSelect"></select>

      <label for="setsInput">Sets</label>
      <input id="setsInput" type="number" min="1" value="3" />

      <button id="logButton">Log Exercise</button>
      <button id="clearButton" class="secondary">Clear This Week</button>
    </section>

    <section class="history-card">
      <h2>This Week</h2>
      <div id="historyList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
